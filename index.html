<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Enrollment Form</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            
        }

        .container {
            background: #ececec;
            max-width: 850px;
            width: 100%;
            padding: 40px;
            border-radius: 10px;
            box-shadow:  14px 13px 23px 1px #000000 
             14px 13px 23px 1px #000000;

        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        h3 {
            font-size: 1.1rem;
            color: var(--accent-color);
            margin: 25px 0 15px 0;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        
        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            
        }

        .form-group {
            display: flex;
            flex-direction: column;
            text-transform: uppercase;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #555;
        }

        input[type="text"],
        input[type="number"],
        input[type="tel"],
        input[type="date"],
        select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

       
        .radio-group, .checkbox-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            padding-top: 5px;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .clear-btn{
               display: block;
            width: 50%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.4s;
        }
        


        .submit-btn {
            display: block;
            width: 50%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.4s;
            
        }

        .submit-btn:hover {
            background-color: #2980b9;
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>College Enrollment Form</h2>
    <form action="#" method="POST">

        <h3>Personal Information</h3>
        <div class="row">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="fname" required>
            </div>
            <div class="form-group">
                <label>Middle Name</label>
                <input type="text" name="mname">
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="lname" required>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Birth Date</label>
                <input type="date" name="birthday" required>
            </div>
            <div class="form-group">
                <label>Birth Place</label>
                <input type="text" name="birthplace" required>
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" min="15" max="100">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Sex</label>
                <div class="radio-group">
                    <label class="check-item"><input type="radio" name="sex" value="male"> Male</label>
                    <label class="check-item"><input type="radio" name="sex" value="female"> Female</label>
                </div>
            </div>
            <div class="form-group">
                <label>Citizenship</label>
                <select name="citizenship">
                    <option value="filipino">Filipino</option>
                    <option value="foreign">Foreign National</option>
                </select>
            </div>
            <div class="form-group">
                <label>Civil Status</label>
                <select name="civil_status">
                    <option value="single">Single</option>
                    <option value="married">Married</option>
                    <option value="widowed">Widowed</option>
                </select>
            </div>
        </div>

        <h3>Permanent Address</h3>
        <div class="row">
            <div class="form-group">
                <label>Region</label>
                <input type="text" name="region" required>
            </div>
            <div class="form-group">
                <label>Province</label>
                <input type="text" name="province" required>
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label>City/Municipality</label>
                <input type="text" name="city" required>
            </div>
            <div class="form-group">
                <label>Barangay</label>
                <input type="text" name="barangay" required>
            </div>
            <div class="form-group" style="flex: 2;">
                <label>House No. / Street</label>
                <input type="text" name="address_detail" required>
            </div>
        </div>

        <h3>Academic Details & Contact</h3>
        <div class="row">
            <div class="form-group">
                <label>Contact Number</label>
                <input type="tel" name="contact" placeholder="09123456789" required>
            </div>
            <div class="form-group">
                <label>Year Level</label>
                <select name="year_level">
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </div>
            <div class="form-group">
                <label>Course</label>
                <select name="course">
                    <option value="BSCS">HM</option>
                    <option value="BSIT">ACT</option>
                    <option value="BSCrim">BSOA</option>
                    <option value="BSEntrep">BS Entrepreneurship</option>
                </select>
            </div>
        </div>

        <h3>Credentials Submitted</h3>
        <div class="checkbox-group">
            <label class="check-item"><input type="checkbox" name="docs" value="form138"> Form 138 (Report Card)</label>
            <label class="check-item"><input type="checkbox" name="docs" value="good_moral"> Good Moral Certificate</label>
            <label class="check-item"><input type="checkbox" name="docs" value="birth_cert"> PSA Birth Certificate</label>
            <label class="check-item"><input type="checkbox" name="docs" value="transfer"> Certificate of Transfer Credentials</label>
            <label class="check-item"><input type="checkbox" name="docs" value="transfer"> Transcrip of Records</label>
            <label class="check-item"><input type="checkbox" name="docs" value="transfer"> Summer Permit / Permit to Cross Enroll</label>
            <label class="check-item"><input type="checkbox" name="docs" value="transfer"> Picture</label>
            <label class="check-item"><input type="checkbox" name="docs" value="transfer"> PSA / NSO</label>
        </div>
        <a href="homepage,,,.html" style="text-decoration: none;">
        <button type="button" class="submit-btn">Submit</button>
        </a>
        <button type="reset" class="clear-btn">Clear</button>

    </form>
</div>

</body>
</html>
